<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Particle Morph</title>

<style>
body { margin:0; overflow:hidden; background:#000; }

#canvas-container { width:100vw; height:100vh; }

.ui-container {
    position:absolute;
    bottom:40px;
    left:50%;
    transform:translateX(-50%);
    width:80%;
    max-width:500px;
}

input[type="text"]{
    width:100%;
    padding:15px;
    border-radius:30px;
    border:1px solid rgba(255,255,255,0.2);
    background:rgba(255,255,255,0.05);
    color:white;
    text-align:center;
}

/* 🎨 Color Picker */
.color-picker{
    position:absolute;
    top:20px;
    right:20px;
}
.color-picker input{
    width:50px;
    height:50px;
    border:none;
    border-radius:50%;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="canvas-container"></div>

<div class="ui-container">
    <input type="text" id="text-input" placeholder="Type text...">
</div>

<div class="color-picker">
    <input type="color" id="colorPicker" value="#ff3366">
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
let scene, camera, renderer, particles;
const particleCount = 30000;
let targetPositions = [];
let velocities = [];
let mouse = new THREE.Vector2(-1000,-1000);

const textCanvas = document.createElement('canvas');
const textCtx = textCanvas.getContext('2d');
textCanvas.width=800;
textCanvas.height=300;

/* ❤️ Heart */
function heart(t,u){
    return new THREE.Vector3(
        16*Math.pow(Math.sin(u),3)*Math.sin(t)*0.7,
        (13*Math.cos(u)-5*Math.cos(2*u)-2*Math.cos(3*u)-Math.cos(4*u))*Math.sin(t)*0.7,
        10*Math.cos(t)*0.7
    );
}

/* 🔤 Text */
function sampleText(text){
    if(!text) return null;

    textCtx.clearRect(0,0,800,300);
    textCtx.fillStyle="white";
    textCtx.font="bold 100px sans-serif";
    textCtx.textAlign="center";
    textCtx.textBaseline="middle";
    textCtx.fillText(text,400,150);

    let data=textCtx.getImageData(0,0,800,300).data;
    let pts=[];

    for(let y=0;y<300;y++){
        for(let x=0;x<800;x++){
            if(data[(y*800+x)*4+3]>150){
                pts.push({
                    x:(x-400)*0.1,
                    y:-(y-150)*0.1,
                    z:(Math.random()-0.5)*2
                });
            }
        }
    }
    return pts;
}

/* 🎯 Targets */
function updateTargets(text){
    const pts=sampleText(text);

    for(let i=0;i<particleCount;i++){
        if(pts){
            targetPositions[i]=pts[i%pts.length];
        } else {
            let p=heart(Math.random()*Math.PI,Math.random()*Math.PI*2);
            targetPositions[i]={x:p.x,y:p.y,z:p.z};
        }
    }
}

/* 🎨 Color */
function changeColor(hex){
    const col=particles.geometry.attributes.color;
    let c=new THREE.Color(hex);

    for(let i=0;i<particleCount;i++){
        col.setXYZ(i,c.r,c.g,c.b);
    }
    col.needsUpdate=true;
}

/* 🚀 Init */
function init(){
    scene=new THREE.Scene();

    camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
    camera.position.z=35;

    renderer=new THREE.WebGLRenderer({alpha:true});
    renderer.setSize(window.innerWidth,window.innerHeight);
    document.getElementById("canvas-container").appendChild(renderer.domElement);

    let geo=new THREE.BufferGeometry();
    let pos=new Float32Array(particleCount*3);
    let col=new Float32Array(particleCount*3);

    for(let i=0;i<particleCount;i++){
        pos[i*3]=(Math.random()-0.5)*200;
        pos[i*3+1]=(Math.random()-0.5)*200;
        pos[i*3+2]=(Math.random()-0.5)*200;

        velocities.push({x:0,y:0,z:0});

        col[i*3]=1; col[i*3+1]=0.2; col[i*3+2]=0.5;
    }

    geo.setAttribute("position",new THREE.BufferAttribute(pos,3));
    geo.setAttribute("color",new THREE.BufferAttribute(col,3));

    let mat=new THREE.PointsMaterial({
        size:0.12,
        vertexColors:true,
        blending:THREE.AdditiveBlending,
        transparent:true
    });

    particles=new THREE.Points(geo,mat);
    scene.add(particles);

    updateTargets("");

    /* UI */
    document.getElementById("text-input").addEventListener("input",e=>{
        updateTargets(e.target.value);
    });

    document.getElementById("colorPicker").addEventListener("input",e=>{
        changeColor(e.target.value);
    });

    window.addEventListener("mousemove",e=>{
        mouse.x=(e.clientX/window.innerWidth)*2-1;
        mouse.y=-(e.clientY/window.innerHeight)*2+1;
    });

    animate();
}

/* 🔄 Animate (WITH MOUSE EFFECT) */
function animate(){
    requestAnimationFrame(animate);

    const pos=particles.geometry.attributes.position;

    // 🔥 Mouse to 3D
    const vec=new THREE.Vector3(mouse.x,mouse.y,0.5);
    vec.unproject(camera);
    const dir=vec.sub(camera.position).normalize();
    const dist=-camera.position.z/dir.z;
    const mPos=camera.position.clone().add(dir.multiplyScalar(dist));

    for(let i=0;i<particleCount;i++){
        let px=pos.getX(i);
        let py=pos.getY(i);
        let pz=pos.getZ(i);

        const t=targetPositions[i];

        // 🧲 Mouse push
        let dx=px-mPos.x;
        let dy=py-mPos.y;
        let dz=pz-mPos.z;
        let d=Math.sqrt(dx*dx+dy*dy+dz*dz);

        if(d<8){
            let f=(8-d)/8;
            velocities[i].x+=(dx/d)*f*2;
            velocities[i].y+=(dy/d)*f*2;
            velocities[i].z+=(dz/d)*f*2;
        }

        // 🎯 Move
        velocities[i].x+=(t.x-px)*0.06;
        velocities[i].y+=(t.y-py)*0.06;
        velocities[i].z+=(t.z-pz)*0.06;

        velocities[i].x*=0.80;
        velocities[i].y*=0.80;
        velocities[i].z*=0.80;

        pos.setXYZ(i,px+velocities[i].x,py+velocities[i].y,pz+velocities[i].z);
    }

    pos.needsUpdate=true;

    renderer.render(scene,camera);
}

window.onload=init;
</script>

</body>
</html>
